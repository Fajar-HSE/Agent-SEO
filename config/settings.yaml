# Global settings for SEO Agent Platform

project:
  name: SEO Agent Platform
  version: "0.1.0"

# Default workflow settings
workflow:
  max_retries: 3
  timeout: 300
  auto_save: true
  log_level: INFO

# Agent defaults
agents:
  default_provider: huggingface
  default_model: Qwen/Qwen2.5-72B-Instruct
  temperature: 0.7
  max_tokens: 4096
  confidence_threshold: 0.6

# Security settings
security:
  check_injection: true
  max_input_length: 8000
  require_approval_above: 0.95

# Paths
paths:
  prompts: prompts/
  knowledge: knowledge/
  logs: logs/
  cache: cache/
