providers:
  huggingface:
    name: huggingface
    base_url: https://router.huggingface.co/v1
    api_key_env: HF_API_TOKEN
    # Model yang terbukti bekerja dengan HF free tier:
    # meta-llama/Llama-3.1-8B-Instruct
    # Qwen/Qwen2.5-7B-Instruct
    # google/gemma-3-12b-it
    # microsoft/phi-4
    default_model: Qwen/Qwen2.5-7B-Instruct
    timeout: 90.0
    models:
      default: Qwen/Qwen2.5-7B-Instruct
      fast: google/gemma-3-4b-it
      quality: meta-llama/Llama-3.1-8B-Instruct

  openrouter:
    name: openrouter
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    default_model: meta-llama/llama-3.1-8b-instruct:free
    site_url: ""
    site_name: SEO Agent
    timeout: 90.0
    models:
      default: meta-llama/llama-3.1-8b-instruct:free
      fast: google/gemini-flash-1.5
      quality: anthropic/claude-3-haiku

  ollama:
    name: ollama
    base_url: http://localhost:11434
    default_model: llama3.1:8b
    timeout: 120.0
    models:
      default: llama3.1:8b
      fast: llama3.1:8b

# Provider fallback chain
fallback_order:
  - huggingface
  - openrouter
  - ollama

cache:
  enabled: true
  ttl_seconds: 3600
  cache_dir: cache

rate_limit:
  rpm: 30
